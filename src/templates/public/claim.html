<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process Claim</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        nwu: {
                            purple: 'rgb(108, 61, 145)',
                            turq: 'rgb(0, 136, 156)',
                            grey: 'rgb(120, 132, 142)',
                            black: 'rgb(24, 21, 18)',
                        }
                    },
                    boxShadow: {
                        'soft': '0 2px 15px -3px rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-[#fcfcfd] text-nwu-black font-sans antialiased min-h-screen flex flex-col selection:bg-nwu-purple selection:text-white">

    <header class="bg-white border-b border-gray-100 relative z-20">
        <div class="max-w-7xl mx-auto px-6 sm:px-10 py-4 flex justify-between items-center">
            <div class="flex items-center gap-5">
                <img src="https://i.ibb.co/60C0LNMG/protection-services-transparent.png"
                    alt="North-West University Logo" class="w-20 h-auto mb-2" />
                <div class="border-l border-gray-200 pl-4 text-left">
                    <h1 class="text-lg font-extrabold text-nwu-purple tracking-tight leading-none">Protection Services
                    </h1>
                    <span class="text-xs font-bold text-nwu-grey mt-1 capitalize tracking-widest block">Staff
                        Portal</span>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p class="text-sm font-bold text-nwu-black tracking-tight">T Motebejane</p>
                    <p class="text-xs font-medium text-nwu-turq">Mahikeng Campus</p>
                </div>
                <a href="#" class="ml-4 text-nwu-grey hover:text-red-500 transition-colors p-2" title="Logout">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                        </path>
                    </svg>
                </a>
            </div>
        </div>
    </header>

    <nav class="bg-nwu-purple text-white shadow-md">
        <div class="max-w-7xl mx-auto px-6 flex justify-center items-center h-12 overflow-x-auto hide-scrollbar">
            <div class="flex gap-8 text-xs font-bold tracking-widest capitalize whitespace-nowrap">
                <a href="#" class="text-white/60 hover:text-white transition-colors">Dashboard</a>
                <a href="#" class="text-white/60 hover:text-white transition-colors">Log New Item</a>
                <a href="#"
                    class="text-white relative after:absolute after:bottom-[-14px] after:left-0 after:w-full after:h-1 after:bg-nwu-turq transition-colors">Inventory</a>
                <a href="#" class="text-white/60 hover:text-white transition-colors">Claim Records</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-5xl mx-auto px-6 sm:px-10 py-10 w-full space-y-6">

        <div class="flex flex-col gap-4">
            <a href="#"
                class="text-sm font-bold text-nwu-grey hover:text-nwu-purple transition-colors flex items-center gap-1 w-max">Back
                to Inventory
            </a>
        </div>

        <div class="bg-white border border-gray-100 rounded-3xl shadow-soft overflow-hidden">

            <div class="p-8">
                <form class="space-y-8">

                    <div>
                        <h4 class="text-[10px] font-black text-nwu-purple capitalize tracking-widest mb-4">1. Claimant
                            Information</h4>

                        <div
                            class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-gray-50 border border-gray-100 p-6 rounded-2xl">
                            <div>
                                <label class="text-xs font-bold text-nwu-black mb-2 block">Student/Staff Number<span
                                        class="text-red-500">*</span></label>
                                <input type="text" name="claimant_num" placeholder="e.g. 54169178"
                                    class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-nwu-purple/20 focus:border-nwu-purple transition-all"
                                    required>
                            </div>

                            <div>
                                <label class="text-xs font-bold text-nwu-black mb-2 block">Full Name<span
                                        class="text-red-500">*</span></label>
                                <input type="text" name="claimant_name" placeholder="e.g. Asonele Ralasi"
                                    class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-nwu-purple/20 focus:border-nwu-purple transition-all"
                                    required>
                            </div>

                            <div class="md:col-span-2">
                                <label class="text-xs font-bold text-nwu-black mb-2 block">Email Address<span
                                        class="text-red-500">*</span></label>
                                <input type="email" name="claimant_email" placeholder="e.g. 54169178@mynwu.ac.za"
                                    class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-nwu-purple/20 focus:border-nwu-purple transition-all"
                                    required>
                            </div>
                        </div>
                    </div>

                    <div>
                        <h4 class="text-[10px] font-black text-nwu-turq capitalize tracking-widest mb-4">2. Claim Record
                            Details</h4>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="text-xs font-bold text-nwu-grey mb-2 block">Item Number</label>
                                <input type="text" name="item_num" value="ITM-8924"
                                    class="w-full bg-gray-100 border border-gray-200 rounded-xl px-4 py-3 text-sm text-nwu-black font-semibold cursor-not-allowed"
                                    readonly>
                            </div>

                            <div>
                                <label class="text-xs font-bold text-nwu-grey mb-2 block">Processing Staff
                                    Member</label>
                                <input type="text" name="staff_num" value="43403638"
                                    class="w-full bg-gray-100 border border-gray-200 rounded-xl px-4 py-3 text-sm text-nwu-black font-semibold cursor-not-allowed"
                                    readonly>
                            </div>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-gray-100 flex justify-end gap-3">
                        <button type="button"
                            class="px-6 py-3 rounded-xl font-bold text-sm text-nwu-grey hover:bg-gray-100 transition-colors">
                            Cancel
                        </button>
                        <button type="submit"
                            class="bg-nwu-turq hover:bg-[#007080] text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-nwu-turq/20 transition-all flex items-center gap-2 text-sm tracking-wide">
                            Submit Claim Record
                        </button>
                    </div>

                </form>
            </div>
        </div>

    </main>

</body>

</html>

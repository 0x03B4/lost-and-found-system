<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        nwu: {
                            purple: 'rgb(108, 61, 145)',
                            turq: 'rgb(0, 136, 156)',
                            grey: 'rgb(120, 132, 142)',
                            black: 'rgb(24, 21, 18)',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-[#fcfcfd] text-nwu-black font-sans antialiased min-h-screen flex flex-col selection:bg-nwu-purple selection:text-white">

    <header class="bg-white border-b border-gray-100 relative z-20">
        <div class="max-w-7xl mx-auto px-6 sm:px-10 py-5 flex justify-between items-center">
            <div class="flex items-center gap-5">
                <img src="https://i.ibb.co/60C0LNMG/protection-services-transparent.png"
                    alt="North-West University Logo" class="w-24 h-auto mb-6" />
                <div class="border-l border-gray-200 pl-5 text-left">
                    <h1 class="text-xl font-extrabold text-nwu-purple tracking-tight leading-none">Protection Services
                    </h1>
                    <span class="text-sm font-medium text-nwu-grey mt-1 block">Lost and Found System</span>
                </div>
            </div>

            <div class="hidden md:block">
                <a href="#"
                    class="inline-flex items-center gap-2 bg-white border border-gray-200 text-nwu-black px-5 py-2.5 rounded-full text-sm font-semibold hover:border-nwu-purple hover:text-nwu-purple transition-all shadow-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                        </path>
                    </svg>
                    Staff Portal
                </a>
            </div>
        </div>
    </header>

    <nav class="bg-gradient-to-r from-nwu-purple to-[#5a327a] text-white shadow-md">
        <div class="max-w-7xl mx-auto px-6 flex justify-center items-center h-12">
            <div class="flex gap-8 text-xs font-bold tracking-widest uppercase">
                <a href="#" class="text-white/70 hover:text-white transition-colors">Home</a>
                <a href="#" class="text-white/70 hover:text-white transition-colors">Search Items</a>
                <a href="#" class="text-white/70 hover:text-white transition-colors">Privacy</a>
                <a href="#" class="text-white/70 hover:text-white transition-colors">Terms</a>
                <a href="#" class="text-white/70 hover:text-white transition-colors">Contact</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center py-20 px-6 bg-slate-50/50">
        <div class="w-full max-w-md">
            <div class="bg-white border border-gray-100 rounded-[2.5rem] shadow-2xl p-10 md:p-12">

                <div class="text-center mb-10">
                    <h2 class="text-3xl font-extrabold text-nwu-black tracking-tight">Staff login</h2>
                </div>

                <form action="#" class="space-y-6">
                    <div>
                        <label for="role" class="text-sm font-bold text-nwu-grey mb-2 block ml-1">Access role</label>
                        <div class="relative">
                            <select id="role"
                                class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:ring-2 focus:ring-nwu-purple/20 focus:border-nwu-purple transition-all appearance-none cursor-pointer">
                                <option value="" disabled selected>Select your role</option>
                                <option value="admin">Administrator</option>
                                <option value="mahikeng">Mahikeng staff</option>
                                <option value="potch">Potchefstroom staff</option>
                                <option value="vanderbijl">Vanderbijlpark staff</option>
                            </select>
                            <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-nwu-grey">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M19 9l-7 7-7-7"></path>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label for="staff-id" class="text-sm font-bold text-nwu-grey mb-2 block ml-1">Staff
                            number</label>
                        <input type="text" id="staff-id" placeholder="Enter staff number"
                            class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:ring-2 focus:ring-nwu-purple/20 focus:border-nwu-purple transition-all">
                    </div>

                    <div>
                        <label for="password" class="text-sm font-bold text-nwu-grey mb-2 block ml-1">Password</label>
                        <input type="password" id="password" placeholder="••••••••"
                            class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:ring-2 focus:ring-nwu-purple/20 focus:border-nwu-purple transition-all">
                        <div class="flex justify-end mt-2">
                            <a href="#" class="text-xs font-bold text-nwu-purple hover:underline tracking-tight">Forgot
                                password?</a>
                        </div>
                    </div>

                    <button type="submit"
                        class="w-full bg-nwu-purple text-white font-bold py-4 rounded-2xl shadow-lg shadow-nwu-purple/20 hover:bg-[#5a327a] transform active:scale-[0.98] transition-all">
                        Login to system
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-nwu-purple text-white mt-auto w-full">
        <div class="max-w-7xl mx-auto px-8 py-16 flex flex-col items-center text-center">
            <img src="https://i.ibb.co/60C0LNMG/protection-services-transparent.png" alt="North-West University Logo"
                class="w-24 h-auto mb-6" />
            <h4 class="font-extrabold text-2xl tracking-tight">North-West University</h4>
            <p class="text-white/70 font-medium mt-1 mb-8">Protection Services</p>
            <div class="text-center text-sm font-medium text-white/50 tracking-wide">
                <p>&copy; 2026 North-West University. All rights reserved.</p>
            </div>
        </div>
    </footer>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="North-West University Protection Services Lost and Found System. Search, identify and claim your lost items across all NWU campuses.">
    <title>{% block title %}Base{% endblock %}</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/60C0LNMG/protection-services-transparent.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        nwu: {
                            purple: 'rgb(108, 61, 145)',
                            turq: 'rgb(0, 136, 156)',
                            grey: 'rgb(120, 132, 142)',
                            black: 'rgb(24, 21, 18)',
                        }
                    },
                    {% block boxshadow %}{% endblock boxshadow %}    
                }
            }
        }
    </script>
</head>

<body class="bg-[#fcfcfd] text-nwu-black font-sans antialiased flex flex-col min-h-screen selection:bg-nwu-purple selection:text-white">
    {% block navbar %} {% endblock %}
    {% block content %} {% endblock %}
    {% block footer %} {% endblock %}
</body>
